<div class="top-bar">
  <div id="content">
    <div class="header">
      <h1>Task Tracker</h1>
      <button class="logout-btn" *ngIf="isAuthenticated" (click)="logout()">Logout</button>
    </div>
  </div>
</div>

<!-- dynamically generated task cards -->
<div class="tasks-container" *ngIf="isAuthenticated && tasks && tasks.length">
  <div
    *ngFor="let task of tasks"
    class="task-card"
    [ngClass]="{ 'incomplete': !task.completed, 'complete': task.completed }"
  >
    <!-- checkmark for all tasks, styled based on completion -->
    <span class="checkmark" [ngClass]="{'completed': task.completed}" (click)="task.completed ? uncompleteTask(task) : completeTask(task)">✓</span>
    <h3>{{ task.title }}</h3>
    <p>{{ task.description || '' }}</p>
    <!-- show button only for unfinished tasks -->
    <button
      *ngIf="!task.completed"
      class="complete-btn"
      (click)="completeTask(task)"
    >
      Mark complete
    </button>
  </div>
</div>

<div class="modal-overlay" *ngIf="showModal">
  <div class="modal-container">
    <div class="modal">

      <h2>{{ isLogin ? 'Login' : 'Sign Up' }}</h2>

      <input
          type="text"
          placeholder="Username"
          [(ngModel)]="username"
          name="username"
          required
        />

        <input
          type="password"
          placeholder="Password"
          [(ngModel)]="password"
          name="password"
          required
        />

        <button type="submit" (click)="submitForm()">
          {{ isLogin ? 'Login' : 'Create Account' }}
        </button>

        <p class="toggle-text" (click)="toggleAuthMode()">
          {{ isLogin ? "Don't have an account already? Sign up" : "Have an account already? Log in" }}
        </p>

    </div>
  </div>
</div>

<!-- add task modal -->
<div class="modal-overlay" *ngIf="showAddModal">
  <div class="modal-container">
    <div class="modal">

      <h2>Add New Task</h2>

      <input
        type="text"
        placeholder="Task Title"
        [(ngModel)]="newTaskTitle"
        name="title"
        required
      />

      <textarea
        placeholder="Task Description (optional)"
        [(ngModel)]="newTaskDescription"
        name="description"
        rows="3"
      ></textarea>

      <input
        type="date"
        placeholder="Due Date (optional)"
        [(ngModel)]="newTaskDueDate"
        name="dueDate"
      />

      <button type="submit" (click)="submitAddToDo()">
        Add Task
      </button>

      <button class="close-btn" (click)="closeAddModal()">✕</button>
    </div>
  </div>
</div>

<!-- floating add button -->
<button class="add-btn" (click)="addToDo()" *ngIf="isAuthenticated">+</button>
